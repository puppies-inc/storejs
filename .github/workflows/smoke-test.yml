name: Smoke Test

on:
  workflow_dispatch:
    inputs:
      api_url:
        description: 'Base URL of the API service'
        required: true
        type: string
      web_url:
        description: 'Base URL of the Web service'
        required: true
        type: string

jobs:
  api-smoke:
    name: API Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - name: Wait for API
        run: |
          echo "Waiting for API at ${{ inputs.api_url }}..."
          for i in $(seq 1 30); do
            if curl -sf "${{ inputs.api_url }}/api/health" > /dev/null 2>&1; then
              echo "API is up!"
              break
            fi
            echo "Attempt $i/30 - retrying in 10s..."
            sleep 10
          done

      - name: Health check
        run: |
          RESP=$(curl -sf "${{ inputs.api_url }}/api/health")
          echo "$RESP"
          echo "$RESP" | jq -e '.status == "ok"'

      - name: List products (GET only)
        run: |
          RESP=$(curl -sf "${{ inputs.api_url }}/api/products")
          echo "Products: $(echo $RESP | jq length)"

  web-smoke:
    name: Web Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - name: Wait for web
        run: |
          for i in $(seq 1 30); do
            if curl -sf "${{ inputs.web_url }}/health" > /dev/null 2>&1; then
              echo "Web is up!"
              break
            fi
            sleep 10
          done

      - name: Homepage loads
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" -L "${{ inputs.web_url }}/")
          echo "Homepage: $CODE"
          [ "$CODE" = "200" ]

      - name: Products page loads
        run: |
          CODE=$(curl -s -o /dev/null -w "%{http_code}" "${{ inputs.web_url }}/products")
          echo "Products page: $CODE"
          [ "$CODE" = "200" ]
