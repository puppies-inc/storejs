projects:
  - name: storejs
    environments:
      # Staging — auto-deploy from staging branch
      - name: staging
        services:
          - type: web
            name: storejs-api
            runtime: node
            plan: free
            region: oregon
            branch: staging
            rootDir: services/api
            buildCommand: npm install
            startCommand: npm start
            healthCheckPath: /api/health
            autoDeploy: true
            envVars:
              - key: NODE_ENV
                value: production

          - type: web
            name: storejs-web
            runtime: node
            plan: free
            region: oregon
            branch: staging
            rootDir: services/web
            buildCommand: npm install
            startCommand: npm start
            healthCheckPath: /health
            autoDeploy: true
            envVars:
              - key: NODE_ENV
                value: production
              - key: API_URL
                fromService:
                  type: web
                  name: storejs-api
                  property: hostport

          - type: web
            name: storejs-worker
            runtime: node
            plan: free
            region: oregon
            branch: staging
            rootDir: services/worker
            buildCommand: npm install
            startCommand: npm start
            healthCheckPath: /health
            autoDeploy: true
            envVars:
              - key: NODE_ENV
                value: production
              - key: API_URL
                fromService:
                  type: web
                  name: storejs-api
                  property: hostport

      # Production — deploy controlled by SuperPlane, tracks main branch
      - name: production
        services:
          - type: web
            name: storejs-api-prod
            runtime: node
            plan: free
            region: oregon
            branch: main
            rootDir: services/api
            buildCommand: npm install
            startCommand: npm start
            healthCheckPath: /api/health
            autoDeploy: false
            envVars:
              - key: NODE_ENV
                value: production

          - type: web
            name: storejs-web-prod
            runtime: node
            plan: free
            region: oregon
            branch: main
            rootDir: services/web
            buildCommand: npm install
            startCommand: npm start
            healthCheckPath: /health
            autoDeploy: false
            envVars:
              - key: NODE_ENV
                value: production
              - key: API_URL
                fromService:
                  type: web
                  name: storejs-api-prod
                  property: hostport

          - type: web
            name: storejs-worker-prod
            runtime: node
            plan: free
            region: oregon
            branch: main
            rootDir: services/worker
            buildCommand: npm install
            startCommand: npm start
            healthCheckPath: /health
            autoDeploy: false
            envVars:
              - key: NODE_ENV
                value: production
              - key: API_URL
                fromService:
                  type: web
                  name: storejs-api-prod
                  property: hostport
